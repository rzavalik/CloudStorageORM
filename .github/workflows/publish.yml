name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*' 
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Resolve package version
      id: vars
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          echo "PACKAGE_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
        else
          echo "PACKAGE_VERSION=0.0.0-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
        fi

    - name: Restore dependencies
      run: dotnet restore CloudStorageORM.sln

    - name: Build solution
      run: dotnet build CloudStorageORM.sln --configuration Release --no-restore

    - name: Pack NuGet package
      run: dotnet pack src/CloudStorageORM/CloudStorageORM.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: Push to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
